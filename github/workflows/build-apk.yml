name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        # Updated to v7 to use the latest Node runtime environments
        uses: actions/checkout@v7

      - name: Find Gradle Root Directory
        id: find-gradle
        run: |
          GRADLE_PATH=$(find . -name gradlew -print -quit)
          if [ -z "$GRADLE_PATH" ]; then
            echo "Error: gradlew file not found anywhere in the repository."
            exit 1
          fi
          GRADLE_DIR=$(dirname "$GRADLE_PATH")
          echo "dir=$GRADLE_DIR" >> $GITHUB_OUTPUT
          echo "Found Gradle root at: $GRADLE_DIR"

      - name: Set up JDK 17
        # Updated to v5 to utilize Node 24 support natively
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Change Gradle Wrapper Permissions
        run: chmod +x ${{ steps.find-gradle.outputs.dir }}/gradlew

      - name: Build Debug APK
        run: |
          cd ${{ steps.find-gradle.outputs.dir }}
          ./gradlew assembleDebug

      - name: Find and Upload Compiled APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
          cache: gradle

      - name: Change Gradle Wrapper Permissions
        run: chmod +x ${{ steps.find-gradle.outputs.dir }}/gradlew

      - name: Build Debug APK
        run: |
          cd ${{ steps.find-gradle.outputs.dir }}
          ./gradlew assembleDebug

      - name: Find and Upload Compiled APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"

